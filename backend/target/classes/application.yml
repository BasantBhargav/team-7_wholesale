
server:
  port: 8080

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/bulk_order_management

app:
  jwt:
    secret: "replace-with-long-secure-secret-key-for-production"
    access-token-exp-minutes: 120
    refresh-token-exp-days: 7

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
